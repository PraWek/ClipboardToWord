<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX to Word Converter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }
        textarea { width: 100%; height: 250px; padding: 12px; border: 1px solid #ced4da; border-radius: 4px; resize: vertical; box-sizing: border-box; font-family: monospace; }
        .file-input-wrapper { background: #e9ecef; padding: 15px; border-radius: 4px; border: 1px dashed #adb5bd; }
        .separator { text-align: center; margin: 25px 0; color: #a4b0be; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        button { display: block; width: 100%; background: #007bff; color: #fff; padding: 15px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s ease; }
        button:hover { background: #0056b3; }
        input[type="file"] { font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Конвертер формул (LaTeX ➔ Word)</h2>
        <form method="POST" enctype="multipart/form-data">

            <div class="form-group file-input-wrapper">
                <label>Вариант 1: Загрузить файл</label>
                <input type="file" name="file" accept=".txt,.md,.docx">
                <small style="display:block; margin-top:5px; color:#6c757d;">Поддерживаются форматы: .txt, .md, .docx</small>
            </div>

            <div class="separator">или</div>

            <div class="form-group">
                <label>Вариант 2: Вставить текст</label>
                <textarea name="text_input" placeholder="Вставь скопированный текст от нейросети сюда..."></textarea>
            </div>

            <button type="submit">Сконвертировать и скачать .docx</button>
        </form>
    </div>
</body>
</html>
